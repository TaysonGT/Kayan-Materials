# Netlify Configuration for Full-Stack Kayan Materials
# Supports both Client (React) and Server (Express) in single repo

[build]
  # Install dependencies for both client and server
  command = "npm run install:all && npm run build:all"
  # Publish the client dist folder
  publish = "client/dist"

[build.environment]
  NODE_ENV = "development"  # Forces npm to install devDependencies
  NPM_CONFIG_PRODUCTION = "false"  # Explicitly disable production-only install

# Development environment
[context.development]
  environment = { NODE_ENV = "development" }

# Production environment  
[context.production]
  environment = { NODE_ENV = "production" }

# Only serve static files and index.html for SPA routes
# API routes (under /api prefix) must be handled by backend service
# NOTE: Netlify Functions approach requires serverless functions
# For better reliability, deploy backend separately to Railway/Render

# Rewrite SPA routes to index.html (except /api/*)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = { Rule = "!Path(/api/*)" }

[[redirects]]
  from = "/api/*"
  to = "http://noel.hidencloud.com:24704/api/:splat"
  status = 200
  force = true
